<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Report Builder — PaveView</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ── SYSTEM ── */
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#141416;--surface:#1c1c1e;--surface2:#222224;
  --border:#2a2a2c;--border2:#1e1e20;
  --text:#f0eeea;--text2:#aaa;--text3:#666;
  --accent:#d4a843;--accent-bg:rgba(212,168,67,.07);
  --ok:#22c55e;--red:#ef4444;
  --fs:14px;
}
body{
  font-family:'Syne',sans-serif;font-size:var(--fs);
  background:var(--bg);color:var(--text);
  height:100vh;display:flex;flex-direction:column;overflow:hidden;
}

/* ── HEADER ── */
#hdr{
  height:44px;background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0;
}
.hdr-back{
  font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text3);
  text-decoration:none;padding:4px 8px;border:1px solid var(--border);
  transition:all .15s;
}
.hdr-back:hover{color:var(--text);border-color:var(--text3)}
#hdr-title{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;letter-spacing:.1em;color:var(--accent)}
.hdr-r{margin-left:auto;display:flex;gap:8px;align-items:center}

/* ── LAYOUT ── */
#body{display:flex;flex:1;overflow:hidden}

/* ── LEFT PANEL ── */
#left{
  width:300px;flex-shrink:0;background:var(--surface);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
}
#left-tabs{
  display:flex;border-bottom:1px solid var(--border);flex-shrink:0;
}
.ltab{
  flex:1;padding:10px;text-align:center;
  font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:600;
  letter-spacing:.08em;text-transform:uppercase;color:var(--text3);
  cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;
}
.ltab.active{color:var(--accent);border-bottom-color:var(--accent)}
.ltab-panel{display:none;flex:1;overflow-y:auto;padding:14px}
.ltab-panel.active{display:block}

/* Theme card */
.theme-card{
  background:var(--surface2);border:1px solid var(--border);
  padding:10px 12px;margin-bottom:8px;cursor:pointer;
  display:flex;align-items:center;gap:8px;transition:border-color .15s;
}
.theme-card:hover,.theme-card.active{border-color:var(--accent)}
.theme-card.active{background:var(--accent-bg)}
.theme-swatch{width:20px;height:20px;border-radius:3px;flex-shrink:0}
.theme-name{font-size:11px;font-weight:600;flex:1}
.theme-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:12px}
.theme-del:hover{color:var(--red)}

/* Controls */
.ctrl-group{margin-bottom:16px}
.ctrl-lbl{
  font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:600;
  color:var(--text3);letter-spacing:.12em;text-transform:uppercase;
  margin-bottom:6px;display:block;
}
.ctrl-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.ctrl-row label{font-size:10px;color:var(--text2);flex:1}
.cinp{
  background:var(--surface2);border:1px solid var(--border);
  color:var(--text);font-family:'JetBrains Mono',monospace;font-size:10px;
  padding:5px 8px;outline:none;width:100%;transition:border-color .15s;
}
.cinp:focus{border-color:var(--accent)}
select.cinp{cursor:pointer}
.clr-inp{width:32px;height:28px;border:1px solid var(--border);padding:2px;cursor:pointer;background:var(--surface2)}

/* Page list */
.page-item{
  background:var(--surface2);border:1px solid var(--border);
  padding:8px 10px;margin-bottom:5px;display:flex;align-items:center;gap:8px;
  cursor:grab;transition:border-color .15s;
}
.page-item:hover{border-color:var(--accent)55}
.page-item.dragging{opacity:.4}
.page-drag{color:var(--text3);font-size:12px;cursor:grab}
.page-vis{cursor:pointer;font-size:11px}
.page-lbl{font-size:10px;flex:1}
.page-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:11px}
.page-del:hover{color:var(--red)}

/* Section toggles */
.sec-toggle{
  display:flex;align-items:center;gap:8px;margin-bottom:6px;
}
.sec-toggle label{font-size:10px;color:var(--text2);flex:1}
.tog{
  width:28px;height:16px;background:var(--border);border-radius:8px;
  position:relative;cursor:pointer;transition:background .2s;flex-shrink:0;
}
.tog.on{background:var(--accent)}
.tog::after{
  content:'';position:absolute;top:2px;left:2px;
  width:12px;height:12px;background:#fff;border-radius:50%;
  transition:transform .2s;
}
.tog.on::after{transform:translateX(12px)}

/* ── RIGHT PANEL ── */
#right{flex:1;background:#e5e7eb;overflow:auto;position:relative}
#preview-wrap{
  padding:24px;min-height:100%;
  display:flex;flex-direction:column;align-items:center;gap:0;
}
.preview-page{
  background:#fff;width:816px;min-height:1056px;
  box-shadow:0 2px 16px rgba(0,0,0,.12);
  position:relative;margin-bottom:24px;
  font-family:'Inter',system-ui,sans-serif;
}

/* ── BUTTON ── */
.btn{
  font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:600;
  letter-spacing:.06em;padding:6px 14px;
  border:1px solid var(--border);background:transparent;color:var(--text);
  cursor:pointer;transition:all .15s;
}
.btn:hover{border-color:var(--text3);color:var(--text)}
.btn.accent{background:var(--accent);color:#000;border-color:var(--accent)}
.btn.accent:hover{background:#e6b84a}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#000}

/* ── DRAG DIVIDER ── */
#divider{
  width:4px;background:var(--border);cursor:col-resize;flex-shrink:0;
  transition:background .15s;position:relative;
}
#divider:hover,#divider.dragging{background:var(--accent)}

/* ── REPORT PAGE STYLES (in preview) ── */
.rp-header{padding:40px 48px 28px;border-bottom:1px solid #e5e7eb;display:flex;justify-content:space-between}
.rp-logo{height:52px;max-width:160px;object-fit:contain}
.rp-coname{font-size:26px;font-weight:800;letter-spacing:-.03em;line-height:1}
.rp-cosub{font-size:11px;color:#9ca3af;margin-top:4px}
.rp-docbadge{display:inline-block;padding:6px 16px;font-size:8px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;margin-bottom:10px}
.rp-meta{font-size:11px;color:#9ca3af;line-height:2;text-align:right}
.rp-stripe{height:4px;margin:0}
.rp-infoband{display:grid;grid-template-columns:1.2fr 1fr 1fr;border-bottom:1px solid #f0f0f0}
.rp-infocell{padding:20px 28px;border-right:1px solid #f0f0f0}
.rp-infocell:last-child{border-right:none}
.rp-lbl{font-size:8px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;margin-bottom:6px}
.rp-infoname{font-size:16px;font-weight:700;margin-bottom:3px}
.rp-infosub{font-size:11px;color:#6b7280;line-height:1.6}
.rp-kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));border-bottom:1px solid #f0f0f0}
.rp-kpi{padding:18px 20px;border-right:1px solid #f0f0f0;position:relative}
.rp-kpi:last-child{border-right:none}
.rp-kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.rp-kpi-lbl{font-size:8px;font-weight:600;color:#9ca3af;letter-spacing:.15em;text-transform:uppercase;margin-bottom:4px}
.rp-kpi-val{font-size:22px;font-weight:800;letter-spacing:-.02em;line-height:1}
.rp-body{padding:28px 48px}
.rp-sec{font-size:8px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;margin:24px 0 10px;padding-bottom:6px;border-bottom:1.5px solid #f0f0f0}
.rp-table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:18px}
.rp-table th{font-size:8px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#6b7280;padding:9px 12px;text-align:left;background:#f8f8f8;border-top:2px solid #111;border-bottom:1px solid #e5e7eb}
.rp-table td{padding:10px 12px;border-bottom:1px solid #f5f5f5;color:#374151}
.rp-table td.n{font-family:'JetBrains Mono',monospace;font-size:11px;text-align:right}
.rp-table tr.tot td{padding:12px;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:11px}
.rp-note{border-left:3px solid;padding:14px 18px;margin-bottom:14px;font-size:12px;color:#4b5563;line-height:1.7}
.rp-sigblock{display:grid;grid-template-columns:1fr 1fr 1fr;gap:24px;margin:28px 0 20px}
.rp-sigline{height:1px;margin-bottom:7px}
.rp-siglbl{font-size:9px;color:#9ca3af;letter-spacing:.12em;text-transform:uppercase;font-weight:600}
.rp-footer{font-size:9px;color:#9ca3af;line-height:1.6;border-top:1px solid #f0f0f0;padding:12px 48px;display:flex;justify-content:space-between}
.rp-custom{padding:48px;min-height:400px}
.rp-custom h2{font-size:22px;font-weight:800;letter-spacing:-.02em;margin:0 0 20px}
.rp-custom p{font-size:13px;color:#374151;line-height:1.9;white-space:pre-wrap}
[contenteditable]{outline:none;cursor:text}
[contenteditable]:hover{box-shadow:inset 0 0 0 1px rgba(212,168,67,.3)}
[contenteditable]:focus{box-shadow:inset 0 0 0 1.5px #d4a843}
</style>
</head>
<body>

<!-- HEADER -->
<div id="hdr">
  <a href="dashboard.html" class="hdr-back">← Dashboard</a>
  <span id="hdr-title">REPORT BUILDER</span>
  <div class="hdr-r">
    <span id="save-status" style="font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text3)"></span>
    <button class="btn" onclick="duplicateTheme()">Duplicate</button>
    <button class="btn accent" onclick="saveTheme()">Save Theme</button>
  </div>
</div>

<!-- BODY -->
<div id="body">

  <!-- LEFT PANEL -->
  <div id="left">
    <div id="left-tabs">
      <div class="ltab active" onclick="switchLTab('themes')">Themes</div>
      <div class="ltab" onclick="switchLTab('design')">Design</div>
      <div class="ltab" onclick="switchLTab('pages')">Pages</div>
    </div>

    <!-- THEMES TAB -->
    <div class="ltab-panel active" id="ltab-themes">
      <div id="theme-list"></div>
      <button class="btn" style="width:100%;margin-top:8px;border-style:dashed" onclick="createTheme()">+ New Theme</button>
    </div>

    <!-- DESIGN TAB -->
    <div class="ltab-panel" id="ltab-design">
      <!-- Colors -->
      <div class="ctrl-group">
        <span class="ctrl-lbl">Brand Colors</span>
        <div class="ctrl-row"><label>Primary (header, totals)</label><input type="color" class="clr-inp" id="d-primary" oninput="updateDesign('primary',this.value)"></div>
        <div class="ctrl-row"><label>Accent (stripe, labels)</label><input type="color" class="clr-inp" id="d-accent" oninput="updateDesign('accent',this.value)"></div>
        <div class="ctrl-row"><label>Background</label><input type="color" class="clr-inp" id="d-bg" oninput="updateDesign('bg',this.value)"></div>
        <div class="ctrl-row"><label>Text</label><input type="color" class="clr-inp" id="d-textcol" oninput="updateDesign('textcol',this.value)"></div>
      </div>

      <!-- Fonts -->
      <div class="ctrl-group">
        <span class="ctrl-lbl">Typography</span>
        <div class="ctrl-row" style="flex-direction:column;align-items:flex-start;gap:4px">
          <label>Heading font</label>
          <select class="cinp" id="d-font-heading" onchange="updateDesign('fontHeading',this.value)">
            <option value="Inter">Inter (Modern)</option>
            <option value="Playfair Display">Playfair Display (Elegant)</option>
            <option value="Outfit">Outfit (Clean)</option>
            <option value="DM Sans">DM Sans (Friendly)</option>
            <option value="Syne">Syne (Bold)</option>
            <option value="Georgia">Georgia (Traditional)</option>
          </select>
        </div>
        <div class="ctrl-row" style="flex-direction:column;align-items:flex-start;gap:4px">
          <label>Body font</label>
          <select class="cinp" id="d-font-body" onchange="updateDesign('fontBody',this.value)">
            <option value="Inter">Inter</option>
            <option value="DM Sans">DM Sans</option>
            <option value="Outfit">Outfit</option>
            <option value="Georgia">Georgia</option>
            <option value="system-ui">System UI</option>
          </select>
        </div>
      </div>

      <!-- Layout -->
      <div class="ctrl-group">
        <span class="ctrl-lbl">Header Layout</span>
        <select class="cinp" id="d-header-style" onchange="updateDesign('headerStyle',this.value)">
          <option value="split">Split (logo left, badge right)</option>
          <option value="centered">Centered (logo top center)</option>
          <option value="banner">Full Banner (dark background)</option>
          <option value="minimal">Minimal (name only)</option>
        </select>
      </div>

      <!-- Stripe style -->
      <div class="ctrl-group">
        <span class="ctrl-lbl">Accent Stripe</span>
        <select class="cinp" id="d-stripe" onchange="updateDesign('stripe',this.value)">
          <option value="gradient">Gradient</option>
          <option value="solid">Solid</option>
          <option value="none">None</option>
          <option value="double">Double line</option>
        </select>
      </div>

      <!-- Table style -->
      <div class="ctrl-group">
        <span class="ctrl-lbl">Table Style</span>
        <select class="cinp" id="d-table-style" onchange="updateDesign('tableStyle',this.value)">
          <option value="clean">Clean (light rows)</option>
          <option value="striped">Striped</option>
          <option value="bordered">Bordered</option>
          <option value="minimal">Minimal (lines only)</option>
        </select>
      </div>

      <!-- Section toggles -->
      <div class="ctrl-group">
        <span class="ctrl-lbl">Sections</span>
        <div id="section-toggles"></div>
      </div>
    </div>

    <!-- PAGES TAB -->
    <div class="ltab-panel" id="ltab-pages">
      <div style="font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--text3);margin-bottom:10px;line-height:1.5">
        Drag to reorder pages. Toggle visibility. Add template pages.
      </div>
      <div id="page-list"></div>
      <div style="margin-top:12px">
        <span class="ctrl-lbl">Add Template Page</span>
        <div id="template-btns" style="display:grid;grid-template-columns:1fr 1fr;gap:6px"></div>
      </div>
    </div>
  </div>

  <!-- DRAG DIVIDER -->
  <div id="divider"></div>

  <!-- RIGHT: PREVIEW -->
  <div id="right">
    <div style="position:sticky;top:0;z-index:10;background:#d1d5db;padding:8px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #b0b4ba">
      <span style="font-family:'JetBrains Mono',monospace;font-size:9px;color:#6b7280;letter-spacing:.08em">PREVIEW — 816px (Letter)</span>
      <button onclick="zoomPreview(-1)" style="background:none;border:1px solid #b0b4ba;padding:2px 8px;cursor:pointer;font-size:11px">−</button>
      <span id="zoom-lbl" style="font-family:'JetBrains Mono',monospace;font-size:9px;color:#6b7280;min-width:36px;text-align:center">100%</span>
      <button onclick="zoomPreview(1)" style="background:none;border:1px solid #b0b4ba;padding:2px 8px;cursor:pointer;font-size:11px">+</button>
      <span style="margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:9px;color:#9ca3af">Click any text to edit</span>
    </div>
    <div id="preview-wrap">
      <!-- Pages render here -->
    </div>
  </div>
</div>

<script>
// ── STATE ──
const LS_KEY = 'paveview_report_themes';
const LS_ACTIVE = 'paveview_active_theme';

let themes = [];
let activeThemeId = null;
let previewZoom = 1;

const DEFAULT_THEME = {
  name: 'PaveView Classic',
  colors: { primary:'#111111', accent:'#d4a843', bg:'#ffffff', textcol:'#1a1a1a' },
  fonts: { heading:'Inter', body:'Inter' },
  headerStyle: 'split',
  stripe: 'gradient',
  tableStyle: 'clean',
  sections: [
    {id:'header', label:'Header', visible:true, locked:true},
    {id:'stripe', label:'Accent Stripe', visible:true},
    {id:'infoband', label:'Client / Site / Project', visible:true},
    {id:'kpis', label:'KPI Cards', visible:true},
    {id:'map', label:'Site Map', visible:true},
    {id:'scope', label:'Scope of Work Table', visible:true},
    {id:'notes', label:'Scope Notes', visible:true},
    {id:'conditions', label:'Special Conditions', visible:true},
    {id:'signatures', label:'Signature Block', visible:true},
    {id:'footer', label:'Footer', visible:true},
  ],
  customPages: []
};

const TEMPLATES = [
  {id:'thank-you', label:'Thank You', icon:'🤝',
   title:'Thank You For Your Business',
   content:'We appreciate the opportunity to serve you. Our team is committed to delivering exceptional quality on time and within budget.\n\nIf you have any questions about this proposal or would like to discuss the scope further, please don\'t hesitate to reach out.\n\nWe look forward to working with you.'},
  {id:'testimonials', label:'Testimonials', icon:'⭐',
   title:'What Our Clients Say',
   content:'"Exceptional work quality and professionalism throughout the entire project." — Property Manager, Commercial Center\n\n"Completed ahead of schedule with zero disruption to our business operations." — Facility Director, Office Park\n\n"The most professional paving contractor we have worked with. Highly recommend." — HOA Board President'},
  {id:'warranty', label:'Warranty', icon:'✓',
   title:'Warranty & Guarantee',
   content:'All asphalt paving work is warranted against defects in materials and workmanship for one year from completion.\n\nSealcoating carries a two-year warranty under normal traffic conditions.\n\nThis warranty does not cover damage caused by tree root intrusion, base settlement, vehicle fluid spills, or acts of nature.\n\nContact our office with your project number to initiate a warranty claim.'},
  {id:'terms', label:'Terms', icon:'📄',
   title:'Terms & Conditions',
   content:'PAYMENT TERMS: 50% deposit required prior to mobilization. Balance due upon completion.\n\nCHANGE ORDERS: Any work outside the original scope requires written authorization and may affect timeline and cost.\n\nWEATHER: Work scheduled based on suitable conditions. We reserve the right to reschedule due to rain, extreme temperatures, or other conditions compromising quality.\n\nSITE PREPARATION: Client is responsible for marking underground utilities and clearing the area of vehicles and obstructions prior to start date.'},
  {id:'blank', label:'Blank', icon:'+', title:'', content:''},
  {id:'photo', label:'Photos', icon:'🖼', title:'Project Reference Photos', content:''},
  {id:'prev-work', label:'Prev. Work', icon:'🏗', title:'Our Previous Work', content:'We take pride in every project we complete. The following represents a sample of our recent commercial and residential paving projects.\n\n[Add photos of previous work here]'},
  {id:'about', label:'About Us', icon:'ℹ', title:'About Our Company', content:'[Your company story — years in business, service area, specialties, certifications, insurance information]'},
];

// ── INIT ──
function init(){
  loadThemes();
  if(!themes.length) createTheme();
  else {
    const savedActive = localStorage.getItem(LS_ACTIVE);
    const found = themes.find(t=>t.id===savedActive);
    activateTheme(found ? found.id : themes[0].id);
  }
  renderTemplateButtons();
  initDivider();
}

// ── THEME MANAGEMENT ──
function loadThemes(){
  try{ themes=JSON.parse(localStorage.getItem(LS_KEY)||'[]'); }
  catch(e){ themes=[]; }
}
function saveAllThemes(){
  localStorage.setItem(LS_KEY, JSON.stringify(themes));
  localStorage.setItem(LS_ACTIVE, activeThemeId);
  setSaveStatus('✓ Saved');
}
function setSaveStatus(msg){
  const el=document.getElementById('save-status');
  if(el){el.textContent=msg;setTimeout(()=>el.textContent='',2000);}
}
function createTheme(){
  const id='theme_'+Date.now();
  const t=JSON.parse(JSON.stringify(DEFAULT_THEME));
  t.id=id;
  t.name='My Theme '+(themes.length+1);
  themes.push(t);
  activateTheme(id);
  saveAllThemes();
}
function duplicateTheme(){
  const curr=getActiveTheme();
  if(!curr)return;
  const id='theme_'+Date.now();
  const t=JSON.parse(JSON.stringify(curr));
  t.id=id;t.name=curr.name+' Copy';
  themes.push(t);
  activateTheme(id);
  saveAllThemes();
}
function deleteTheme(id){
  if(themes.length<=1){alert('You need at least one theme.');return;}
  if(!confirm('Delete this theme?'))return;
  themes=themes.filter(t=>t.id!==id);
  activateTheme(themes[0].id);
  saveAllThemes();
}
function saveTheme(){
  saveAllThemes();
  // Also update global brand colors for project.html
  const t=getActiveTheme();
  if(t){
    localStorage.setItem('paveview_brand_primary',t.colors.primary);
    localStorage.setItem('paveview_brand_accent',t.colors.accent);
  }
}
function getActiveTheme(){ return themes.find(t=>t.id===activeThemeId)||null; }

function activateTheme(id){
  activeThemeId=id;
  renderThemeList();
  renderDesignControls();
  renderPageList();
  renderPreview();
}

function renderThemeList(){
  const list=document.getElementById('theme-list');
  list.innerHTML=themes.map(t=>`
    <div class="theme-card${t.id===activeThemeId?' active':''}" onclick="activateTheme('${t.id}')">
      <div class="theme-swatch" style="background:${t.colors.primary}"></div>
      <div class="theme-swatch" style="background:${t.colors.accent}"></div>
      <span class="theme-name">${t.name}</span>
      <button class="theme-del" onclick="event.stopPropagation();deleteTheme('${t.id}')">✕</button>
    </div>`).join('');
}

// ── DESIGN CONTROLS ──
function renderDesignControls(){
  const t=getActiveTheme();if(!t)return;
  document.getElementById('d-primary').value=t.colors.primary;
  document.getElementById('d-accent').value=t.colors.accent;
  document.getElementById('d-bg').value=t.colors.bg||'#ffffff';
  document.getElementById('d-textcol').value=t.colors.textcol||'#1a1a1a';
  document.getElementById('d-font-heading').value=t.fonts.heading||'Inter';
  document.getElementById('d-font-body').value=t.fonts.body||'Inter';
  document.getElementById('d-header-style').value=t.headerStyle||'split';
  document.getElementById('d-stripe').value=t.stripe||'gradient';
  document.getElementById('d-table-style').value=t.tableStyle||'clean';
  renderSectionToggles();
}

function updateDesign(key, val){
  const t=getActiveTheme();if(!t)return;
  if(['primary','accent','bg','textcol'].includes(key)) t.colors[key]=val;
  else if(key==='fontHeading') t.fonts.heading=val;
  else if(key==='fontBody') t.fonts.body=val;
  else if(key==='headerStyle') t.headerStyle=val;
  else if(key==='stripe') t.stripe=val;
  else if(key==='tableStyle') t.tableStyle=val;
  renderPreview();
}

function renderSectionToggles(){
  const t=getActiveTheme();if(!t)return;
  const wrap=document.getElementById('section-toggles');
  wrap.innerHTML=t.sections.map((s,i)=>`
    <div class="sec-toggle">
      <label>${s.label}</label>
      ${s.locked?`<div class="tog on" title="Required"></div>`:
        `<div class="tog${s.visible?' on':''}" onclick="toggleSection(${i})"></div>`}
    </div>`).join('');
}
function toggleSection(i){
  const t=getActiveTheme();if(!t)return;
  t.sections[i].visible=!t.sections[i].visible;
  renderSectionToggles();
  renderPreview();
}

// ── PAGE LIST ──
function renderPageList(){
  const t=getActiveTheme();if(!t)return;
  const list=document.getElementById('page-list');
  const builtIn=t.sections.map((s,i)=>({...s,builtIn:true,idx:i}));
  const custom=(t.customPages||[]).map((p,i)=>({...p,builtIn:false,idx:i}));
  const all=[...builtIn,...custom];
  list.innerHTML=all.map((pg,i)=>`
    <div class="page-item" draggable="${!pg.builtIn}" data-idx="${i}">
      <span class="page-drag">${pg.builtIn?'≡':'⠿'}</span>
      <span class="page-vis" onclick="toggleSection(${pg.idx})">${pg.visible!==false?'👁':'·'}</span>
      <span class="page-lbl" style="color:${pg.builtIn?'var(--text2)':'var(--text)'}">${pg.label||pg.title||'Untitled'}</span>
      ${!pg.builtIn?`<button class="page-del" onclick="removeCustomPage(${pg.idx})">✕</button>`:''}
    </div>`).join('');
}

function renderTemplateButtons(){
  const wrap=document.getElementById('template-btns');
  wrap.innerHTML=TEMPLATES.map(t=>`
    <button class="btn" onclick="addTemplatePage('${t.id}')"
      style="padding:8px;display:flex;flex-direction:column;align-items:center;gap:3px;height:60px">
      <span style="font-size:16px">${t.icon}</span>
      <span style="font-size:8px">${t.label}</span>
    </button>`).join('');
}

function addTemplatePage(templateId){
  const t=getActiveTheme();if(!t)return;
  const tpl=TEMPLATES.find(x=>x.id===templateId);if(!tpl)return;
  t.customPages=t.customPages||[];
  t.customPages.push({id:'cp_'+Date.now(),title:tpl.title,content:tpl.content,image:'',templateId});
  renderPageList();
  renderPreview();
}
function removeCustomPage(idx){
  const t=getActiveTheme();if(!t)return;
  t.customPages.splice(idx,1);
  renderPageList();
  renderPreview();
}

// ── PREVIEW RENDER ──
function renderPreview(){
  const t=getActiveTheme();
  const wrap=document.getElementById('preview-wrap');
  if(!t){wrap.innerHTML='<div style="padding:40px;color:#888">No theme selected</div>';return;}

  const p=t.colors.primary||'#111';
  const a=t.colors.accent||'#d4a843';
  const bg=t.colors.bg||'#fff';
  const tx=t.colors.textcol||'#1a1a1a';
  const hf=t.fonts.heading||'Inter';
  const bf=t.fonts.body||'Inter';
  const sec=s=>t.sections.find(x=>x.id===s)?.visible!==false;

  const stripeHtml=()=>{
    if(t.stripe==='none')return'';
    if(t.stripe==='solid')return`<div class="rp-stripe" style="background:${a}"></div>`;
    if(t.stripe==='double')return`<div style="height:2px;background:${a}"></div><div style="height:1px;background:${p}22;margin-top:2px"></div>`;
    return`<div class="rp-stripe" style="background:linear-gradient(90deg,${p} 0%,${a} 40%,${p} 100%)"></div>`;
  };

  const headerHtml=()=>{
    const logo=localStorage.getItem('paveview_logo')||'';
    const coName=localStorage.getItem('paveview_company')||'Your Company';
    const logoEl=logo?`<img src="${logo}" class="rp-logo" alt="Logo">`:'';
    if(t.headerStyle==='banner'){
      return`<div style="background:${p};padding:36px 48px;display:flex;justify-content:space-between;align-items:center">
        ${logoEl?`<div>${logoEl}</div>`:`<div style="font-size:26px;font-weight:800;color:#fff;font-family:'${hf}'">${coName}</div>`}
        <div><div class="rp-docbadge" style="background:${a};color:#000;font-family:'${hf}'">CLIENT PROPOSAL</div>
        <div style="font-size:11px;color:#ffffff88;text-align:right;margin-top:6px">Today's Date<br>Job #: 2024-001</div></div>
      </div>`;
    }
    if(t.headerStyle==='centered'){
      return`<div style="padding:36px 48px 24px;text-align:center;border-bottom:1px solid #e5e7eb">
        ${logoEl?`<div style="display:flex;justify-content:center;margin-bottom:10px">${logoEl}</div>`:''}
        <div style="font-size:26px;font-weight:800;font-family:'${hf}';color:${tx}">${coName}</div>
        <div style="margin-top:14px"><span class="rp-docbadge" style="background:${p};color:${a};font-family:'JetBrains Mono',monospace">CLIENT PROPOSAL</span></div>
      </div>`;
    }
    if(t.headerStyle==='minimal'){
      return`<div style="padding:28px 48px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #f0f0f0">
        <div style="font-size:22px;font-weight:700;font-family:'${hf}';color:${tx};border-left:4px solid ${a};padding-left:12px">${coName}</div>
        <div style="font-size:9px;font-weight:600;color:#9ca3af;letter-spacing:.2em">CLIENT PROPOSAL</div>
      </div>`;
    }
    // default: split
    return`<div class="rp-header" style="font-family:'${bf}'">
      <div>${logoEl}<div class="rp-coname" style="font-family:'${hf}';color:${tx}">${coName}</div>
      <div class="rp-cosub">Professional Paving Services</div></div>
      <div><div class="rp-docbadge" style="background:${p};color:${a};font-family:'JetBrains Mono',monospace">CLIENT PROPOSAL</div>
      <div class="rp-meta">Today's Date<br>Job #: 2024-001<br>Estimator: John Smith</div></div>
    </div>`;
  };

  const tableStyle=()=>{
    if(t.tableStyle==='striped')return`<style>.rp-table tbody tr:nth-child(even){background:#f8f8f8}</style>`;
    if(t.tableStyle==='bordered')return`<style>.rp-table td,.rp-table th{border:1px solid #e5e7eb!important}</style>`;
    if(t.tableStyle==='minimal')return`<style>.rp-table thead tr{background:none;border-top:none}.rp-table th{color:${p};border-bottom:2px solid ${p}!important}.rp-table td{border-bottom:1px solid #e5e7eb}</style>`;
    return'';
  };

  // Build main page
  let pages=[];
  let mainPage=`<div class="preview-page" style="background:${bg};font-family:'${bf}';color:${tx}">
    ${tableStyle()}
    ${sec('header')?headerHtml():''}
    ${sec('stripe')?stripeHtml():''}
    ${sec('infoband')?`<div class="rp-infoband">
      <div class="rp-infocell"><div class="rp-lbl" style="color:${a}">Prepared For</div>
        <div class="rp-infoname" style="font-family:'${hf}'" contenteditable="true">Acme Property Group</div>
        <div class="rp-infosub" contenteditable="true">John Smith<br>555-867-5309<br>john@acme.com</div>
      </div>
      <div class="rp-infocell"><div class="rp-lbl" style="color:${a}">Job Site</div>
        <div class="rp-infoname" style="font-family:'${hf}'" contenteditable="true">1234 Commerce Blvd, Austin TX</div>
      </div>
      <div class="rp-infocell"><div class="rp-lbl" style="color:${a}">Project</div>
        <div class="rp-infoname" style="font-family:'${hf}'" contenteditable="true">North Lot Repaving</div>
        <div class="rp-infosub">Start: March 2024</div>
      </div>
    </div>`:''}
    ${sec('kpis')?`<div class="rp-kpi-grid">
      <div class="rp-kpi" style="border-right:1px solid #f0f0f0">
        <div class="rp-kpi-lbl" style="color:${a}">Total Area</div>
        <div class="rp-kpi-val" style="font-family:'${hf}'">24,500</div>
        <div style="font-size:9px;color:#9ca3af;margin-top:3px">sq ft</div>
        <div style="position:absolute;top:0;left:0;right:0;height:3px;background:${a}"></div>
      </div>
      <div class="rp-kpi" style="border-right:1px solid #f0f0f0">
        <div class="rp-kpi-lbl">Acreage</div>
        <div class="rp-kpi-val" style="font-family:'${hf}'">0.562</div>
        <div style="position:absolute;top:0;left:0;right:0;height:3px;background:#e5e7eb"></div>
      </div>
      <div class="rp-kpi" style="border-right:1px solid #f0f0f0">
        <div class="rp-kpi-lbl">Stalls</div>
        <div class="rp-kpi-val" style="font-family:'${hf}'">84</div>
        <div style="position:absolute;top:0;left:0;right:0;height:3px;background:#3b82f6"></div>
      </div>
      <div class="rp-kpi">
        <div class="rp-kpi-lbl" style="color:${a}">Est. Total</div>
        <div class="rp-kpi-val" style="font-family:'${hf}'">$42,800</div>
        <div style="position:absolute;top:0;left:0;right:0;height:3px;background:${a}"></div>
      </div>
    </div>`:''}
    <div class="rp-body" style="font-family:'${bf}'">
      ${sec('map')?`<div class="rp-sec" style="color:${a}">Site Plan</div>
        <div style="background:#1a1a1a;height:260px;border-radius:3px;display:flex;align-items:center;justify-content:center;margin-bottom:18px">
          <span style="font-size:11px;color:#555;font-family:'JetBrains Mono',monospace">[ SITE MAP RENDERS HERE FROM TAKEOFF ]</span>
        </div>`:''}
      ${sec('scope')?`<div class="rp-sec" style="color:${a}">Scope of Work</div>
        <table class="rp-table">
          <thead><tr>
            <th>Description</th><th style="text-align:right">Qty</th>
            <th style="text-align:right">Unit</th><th style="text-align:right">Est. Cost</th>
          </tr></thead>
          <tbody>
            <tr><td contenteditable="true"><strong>Zone 1</strong> — Asphalt Paving (3" depth)</td>
              <td class="n" contenteditable="true">18,400</td><td class="n">sq ft</td>
              <td class="n" contenteditable="true">$28,520</td></tr>
            <tr><td contenteditable="true"><strong>Zone 2</strong> — Asphalt Paving (3" depth)</td>
              <td class="n" contenteditable="true">6,100</td><td class="n">sq ft</td>
              <td class="n" contenteditable="true">$9,455</td></tr>
            <tr><td contenteditable="true">Parking Stall Striping — Standard</td>
              <td class="n" contenteditable="true">80</td><td class="n">stalls</td>
              <td class="n">—</td></tr>
            <tr><td contenteditable="true">Parking Stall Striping — ADA</td>
              <td class="n" contenteditable="true">4</td><td class="n">stalls</td>
              <td class="n">—</td></tr>
            <tr class="tot" style="background:${p};color:${a}">
              <td colspan="3" style="font-family:'JetBrains Mono',monospace;font-weight:700;font-size:10px;letter-spacing:.08em">ESTIMATED TOTAL</td>
              <td style="font-family:'JetBrains Mono',monospace;font-weight:700;font-size:10px;text-align:right" contenteditable="true">$42,800</td>
            </tr>
          </tbody>
        </table>`:''}
      ${sec('notes')?`<div class="rp-sec" style="color:${a}">Scope Notes</div>
        <div class="rp-note" style="border-color:${a};background:${a}08" contenteditable="true">
          Includes removal of existing asphalt in Zone 1. Existing base to be inspected and repaired as needed. Sealcoating not included in this proposal.
        </div>`:''}
      ${sec('conditions')?`<div class="rp-sec" style="color:${a}">Special Conditions</div>
        <div class="rp-note" style="border-color:#6b7280;background:#f9f9f9" contenteditable="true">
          No work before 7AM. Property manager must be on site for first day of work. Area to be cleared of all vehicles by 6AM on scheduled start day.
        </div>`:''}
      ${sec('signatures')?`<div class="rp-sec" style="color:${a};margin-top:32px">Authorization</div>
        <div class="rp-sigblock">
          <div><div class="rp-sigline" style="background:${p}"></div><div class="rp-siglbl">Contractor / Date</div></div>
          <div><div class="rp-sigline" style="background:${p}"></div><div class="rp-siglbl">Client Signature / Date</div></div>
          <div><div class="rp-sigline" style="background:${p}"></div><div class="rp-siglbl">Project Start Date</div></div>
        </div>`:''}
    </div>
    ${sec('footer')?`<div class="rp-footer">
      <span style="font-weight:600;color:${p}">${localStorage.getItem('paveview_company')||'Your Company'}</span>
      <span>By signing, both parties agree to the scope and estimated costs. Final invoice may vary based on field conditions.</span>
    </div>`:''}
  </div>`;
  pages.push(mainPage);

  // Custom pages
  (t.customPages||[]).forEach(cp=>{
    const stripeH=t.stripe!=='none'?`<div style="height:4px;background:${a}"></div>`:'';
    pages.push(`<div class="preview-page rp-custom" style="background:${bg};font-family:'${bf}';color:${tx}">
      ${stripeH}
      <div style="padding:40px 48px">
        <div style="font-size:8px;font-weight:700;color:${a};letter-spacing:.2em;text-transform:uppercase;margin-bottom:10px">Custom Page</div>
        ${cp.image?`<img src="${cp.image}" style="width:100%;max-height:300px;object-fit:cover;margin-bottom:20px;border-radius:3px">`:''}
        <label style="display:block;cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:8px;color:#9ca3af;margin-bottom:${cp.image?0:20}px">
          📎 ${cp.image?'Change image':'Attach image / PDF page'}
          <input type="file" accept="image/*" style="display:none" onchange="attachPageImage(event,'${cp.id}')">
        </label>
        <h2 class="rp-custom" contenteditable="true" style="font-family:'${hf}';color:${tx};font-size:24px;font-weight:800;letter-spacing:-.02em;margin:0 0 18px;outline:none;padding:0;min-height:1em" data-page-id="${cp.id}" data-field="title">${cp.title||'Page Title'}</h2>
        <div contenteditable="true" style="font-size:13px;color:#374151;line-height:1.9;white-space:pre-wrap;outline:none;min-height:60px" data-page-id="${cp.id}" data-field="content">${cp.content||'Start typing here…'}</div>
      </div>
    </div>`);
  });

  wrap.innerHTML=pages.join('');
  applyZoom();

  // Wire up contenteditable save-back
  wrap.querySelectorAll('[data-page-id]').forEach(el=>{
    el.addEventListener('input',()=>{
      const t2=getActiveTheme();if(!t2)return;
      const id=el.dataset.pageId, field=el.dataset.field;
      const pg=(t2.customPages||[]).find(p=>p.id===id);
      if(pg)pg[field]=el.innerText;
    });
  });
}

function attachPageImage(e, pageId){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const t=getActiveTheme();if(!t)return;
    const pg=(t.customPages||[]).find(p=>p.id===pageId);
    if(pg){pg.image=ev.target.result;renderPreview();}
  };
  reader.readAsDataURL(file);
}

// ── ZOOM ──
function applyZoom(){
  const wrap=document.getElementById('preview-wrap');
  wrap.style.transform=`scale(${previewZoom})`;
  wrap.style.transformOrigin='top center';
  wrap.style.marginBottom=(previewZoom-1)*-300+'px';
  document.getElementById('zoom-lbl').textContent=Math.round(previewZoom*100)+'%';
}
function zoomPreview(dir){
  previewZoom=Math.max(.4,Math.min(1.5,previewZoom+dir*0.1));
  applyZoom();
}

// ── TABS ──
function switchLTab(name){
  document.querySelectorAll('.ltab').forEach((t,i)=>{
    const names=['themes','design','pages'];
    t.classList.toggle('active',names[i]===name);
  });
  document.querySelectorAll('.ltab-panel').forEach(p=>{
    p.classList.remove('active');
  });
  document.getElementById('ltab-'+name).classList.add('active');
}

// ── DIVIDER DRAG ──
function initDivider(){
  const div=document.getElementById('divider');
  const left=document.getElementById('left');
  let dragging=false,startX=0,startW=0;
  div.addEventListener('mousedown',e=>{dragging=true;startX=e.clientX;startW=left.offsetWidth;div.classList.add('dragging');});
  window.addEventListener('mousemove',e=>{if(!dragging)return;const w=Math.max(220,Math.min(450,startW+(e.clientX-startX)));left.style.width=w+'px';});
  window.addEventListener('mouseup',()=>{dragging=false;div.classList.remove('dragging');});
}

// ── START ──
init();
</script>
</body>
</html>
